<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pa'onde Santi - Ingreso</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto flex min-h-screen max-w-md flex-col justify-between px-4 py-8">
        <section class="rounded-[2rem] border border-slate-800 bg-slate-900/95 p-6 shadow-2xl shadow-black/30 backdrop-blur-xl">
            <div class="mb-8 text-center">
                <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-3xl bg-amber-500 text-slate-950">
                    <span class="text-2xl font-black">⚽</span>
                </div>
                <h1 class="text-2xl font-extrabold text-white">Polla Mundialista Pa'onde Santi</h1>
                <p class="mt-2 text-sm text-slate-400">Ingresa tu celular y empieza a jugar!!!.</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <!-- CAMPO 1: CELULAR -->
                <div>
                    <label for="celular" class="block text-xs font-semibold uppercase tracking-[0.3em] text-slate-400">Número de celular</label>
                    <input id="celular" type="tel" inputmode="numeric" pattern="[0-9]*" required
                        class="mt-3 h-14 w-full rounded-3xl border border-slate-700 bg-slate-950 px-4 text-base text-white outline-none transition focus:border-amber-400 focus:ring-2 focus:ring-amber-500/20" />
                </div>

                <!-- CAMPOS DE REGISTRO OCULTOS -->
                <div id="registerFields" class="hidden space-y-5">
                    <div>
                        <label for="nombreCompleto" class="block text-xs font-semibold uppercase tracking-[0.3em] text-slate-400">Nombres y Apellidos</label>
                        <input id="nombreCompleto" type="text" autocomplete="name"
                            class="mt-3 h-14 w-full rounded-3xl border border-slate-700 bg-slate-950 px-4 text-base text-white outline-none transition focus:border-amber-400 focus:ring-2 focus:ring-amber-500/20" />
                    </div>

                    <div>
                        <label for="correo" class="block text-xs font-semibold uppercase tracking-[0.3em] text-slate-400">Correo Electrónico</label>
                        <input id="correo" type="email" autocomplete="email"
                            class="mt-3 h-14 w-full rounded-3xl border border-slate-700 bg-slate-950 px-4 text-base text-white outline-none transition focus:border-amber-400 focus:ring-2 focus:ring-amber-500/20" />
                    </div>

                    <div>
                        <label for="factura" class="block text-xs font-semibold uppercase tracking-[0.3em] text-slate-400">Número de Factura Única</label>
                        <input id="factura" type="text" placeholder="Ej: F-1234"
                            class="mt-3 h-14 w-full rounded-3xl border border-slate-700 bg-slate-950 px-4 text-base text-white outline-none transition focus:border-amber-400 focus:ring-2 focus:ring-amber-500/20" />
                    </div>

                    <p class="text-sm leading-6 text-slate-400">Completa tus datos para validar tu participación y crear tu cuenta.</p>
                </div>

                <!-- BOTONES DE ACCIÓN -->
                <div class="space-y-3">
                    <button id="continueButton" type="submit"
                        class="flex h-14 w-full items-center justify-center rounded-3xl bg-amber-500 text-base font-bold text-slate-950 transition hover:bg-amber-400 disabled:cursor-not-allowed disabled:opacity-70">
                        Continuar
                    </button>
                    <button id="registerButton" type="button" class="hidden h-14 w-full rounded-3xl bg-sky-500 text-base font-bold text-slate-950 transition hover:bg-sky-400 disabled:cursor-not-allowed disabled:opacity-70">
                        Registrarme
                    </button>
                    <!-- NUEVO BOTÓN: CANCELAR / RETROCEDER -->
                    <button id="cancelButton" type="button" class="hidden h-14 w-full rounded-3xl border border-slate-700 bg-transparent text-base font-semibold text-slate-400 transition hover:bg-slate-800/50 hover:text-white">
                        Volver a ingresar celular
                    </button>
                </div>
            </form>

            <div id="toggleRegLinkContainer" class="mt-4 text-center">
                <button id="toggleRegLink" type="button" class="text-xs text-amber-400 hover:underline cursor-pointer font-medium">
                    ¿Eres nuevo? Regístrate aquí
                </button>
            </div>

            <p id="infoMessage" class="mt-6 text-center text-sm text-slate-400"></p>
        </section>

        <footer class="mt-8 text-center text-xs text-slate-500">
            © 2026 Pa'onde Santi • Diseño móvil optimizado
        </footer>
    </main>

    <script>
        const SUPABASE_URL = "https://wpuojiqbgxqdolalzfql.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndwdW9qaXFiZ3hxZG9sYWx6ZnFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NDA4OTcsImV4cCI6MjA5NjIxNjg5N30.wiTgJrSogrCxDwK3YlP87rPyRUfne8OcSkirtEQQClo";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const loginForm = document.getElementById('loginForm');
        const registerButton = document.getElementById('registerButton');
        const cancelButton = document.getElementById('cancelButton');
        const registerFields = document.getElementById('registerFields');
        const infoMessage = document.getElementById('infoMessage');
        const continueButton = document.getElementById('continueButton');
        const nombreCompleto = document.getElementById('nombreCompleto');
        const correoInput = document.getElementById('correo');
        const facturaInput = document.getElementById('factura');
        const celularInput = document.getElementById('celular');
        const toggleRegLink = document.getElementById('toggleRegLink');
        const toggleRegLinkContainer = document.getElementById('toggleRegLinkContainer');
        let currentPhone = '';

        document.addEventListener('DOMContentLoaded', () => {
            const storedId = localStorage.getItem('cliente_id');
            if (storedId) {
                window.location.href = 'polla.html';
            }
        });

        function activarCamposRegistro() {
            registerFields.classList.remove('hidden');
            registerButton.classList.remove('hidden');
            cancelButton.classList.remove('hidden'); // Muestra botón cancelar
            continueButton.classList.add('hidden');
            toggleRegLinkContainer.classList.add('hidden');
            
            nombreCompleto.required = true;
            correoInput.required = true;
            facturaInput.required = true;
        }

        // LÓGICA PARA RETROCEDER / CANCELAR AL ESTADO INICIAL
        function desactivarCamposRegistro() {
            registerFields.classList.add('hidden');
            registerButton.classList.add('hidden');
            cancelButton.classList.add('hidden'); // Oculta botón cancelar
            continueButton.classList.remove('hidden');
            toggleRegLinkContainer.classList.remove('hidden');
            
            // Quita requerimientos y limpia campos de registro
            nombreCompleto.required = false;
            correoInput.required = false;
            facturaInput.required = false;
            nombreCompleto.value = '';
            correoInput.value = '';
            facturaInput.value = '';
            currentPhone = '';
            
            updateMessage('');
            celularInput.focus();
        }

        cancelButton.addEventListener('click', desactivarCamposRegistro);

        toggleRegLink.addEventListener('click', () => {
            activarCamposRegistro();
            nombreCompleto.focus();
            updateMessage('Completa todos los campos para crear tu cuenta al instante.', false);
        });

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const celular = celularInput.value.trim();
            if (!celular) {
                updateMessage('Ingresa tu número de celular para continuar.', true);
                return;
            }
            toggleButtons(true, 'Verificando...');
            updateMessage('');

            try {
                const { data, error } = await supabaseClient
                    .from('clientes')
                    .select('id, nombres_apellidos')
                    .eq('celular', celular)
                    .maybeSingle();

                if (error) throw error;
                if (data) {
                    localStorage.setItem('cliente_id', data.id);
                    localStorage.setItem('cliente_name', data.nombres_apellidos);
                    window.location.href = 'polla.html';
                    return;
                }
                
                currentPhone = celular;
                activarCamposRegistro();
                updateMessage('Nuevo número. Completa tus datos y presiona Registrarme.', false);
                nombreCompleto.focus();
            } catch (error) {
                console.error(error);
                updateMessage('Error al conectar con Supabase. Revisa la red o la clave.', true);
            } finally {
                toggleButtons(false, 'Continuar');
            }
        });

        registerButton.addEventListener('click', async () => {
            const nombre = nombreCompleto.value.trim();
            const correo = correoInput.value.trim();
            const factura = facturaInput.value.trim();
            const celular = currentPhone || celularInput.value.trim();
            
            if (!nombre || !celular || !correo || !factura) {
                updateMessage('Por favor completa todos los campos del formulario.', true);
                return;
            }
            
            registerButton.disabled = true;
            registerButton.textContent = 'Guardando...';
            updateMessage('');

            try {
                const { data, error } = await supabaseClient
                    .from('clientes')
                    .insert([{ 
                        nombres_apellidos: nombre, 
                        celular: celular,
                        correo: correo,
                        numero_factura: factura
                    }])
                    .select();

                if (error) throw error;
                if (data && data.length > 0) {
                    localStorage.setItem('cliente_id', data[0].id);
                    localStorage.setItem('cliente_name', data[0].nombres_apellidos);
                    window.location.href = 'polla.html';
                    return;
                }
                updateMessage('No se pudo crear el usuario, intenta de nuevo.', true);
            } catch (error) {
                console.error(error);
                updateMessage('Error al crear la cuenta. Revisa consola y red.', true);
            } finally {
                registerButton.disabled = false;
                registerButton.textContent = 'Registrarme';
            }
        });

        function updateMessage(text, isError = false) {
            infoMessage.textContent = text;
            infoMessage.className = isError ? 'mt-6 text-center text-sm text-rose-400' : 'mt-6 text-center text-sm text-slate-400';
        }

        function toggleButtons(disabled, label) {
            continueButton.disabled = disabled;
            continueButton.textContent = label;
            registerButton.disabled = disabled;
            cancelButton.disabled = disabled;
            if (!registerButton.classList.contains('hidden')) {
                registerButton.textContent = disabled ? 'Guardando...' : 'Registrarme';
            }
        }
    </script>
</body>
</html>
